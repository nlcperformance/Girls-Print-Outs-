                            <th class="p-2 text-center w-12 border-l border-gray-300 print-border-black">RPE</th>
                            <th class="p-2 text-center w-16 border-l border-gray-300 print-border-black">Rest</th>
                            <th class="p-2 text-center border-l border-gray-300 print-border-black w-10">S1</th>
                            <th class="p-2 text-center border-l border-gray-300 print-border-black w-10">S2</th>
                            <th class="p-2 text-center border-l border-gray-300 print-border-black w-10">S3</th>
                            <th class="p-2 text-center border-l border-gray-300 print-border-black w-10">S4</th>
                            <th class="p-2 w-20 border-l border-gray-300 print-border-black text-center">Load (KG)</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        ${rows}
                        ${emptyRows}
                    </tbody>
                </table>
            </div>
            `;
        };

        const getFooterHTML = () => `
            <div class="mt-4 flex gap-4 h-24 shrink-0">
                <div class="flex-1 border-2 border-gray-300 print-border-black rounded-lg bg-gray-50 print-bg-white p-2 relative shadow-sm">
                    <span class="text-[10px] font-black text-gray-500 print-text-black uppercase tracking-widest">Coaching Notes & Adjustments</span>
                    <div class="h-full flex items-end pb-1">
                        <span class="text-[9px] text-gray-400 print-text-black italic w-full text-center">(Record loads, box heights, completion times, or modifications here)</span>
                    </div>
                </div>

                <div class="w-56 border-[3px] border-black print-border-black rounded-lg flex flex-col bg-white p-2 shadow-sm">
                    <span class="text-[10px] font-black text-black uppercase tracking-widest border-b-2 border-gray-200 print-border-black mb-1.5 pb-1 text-center">Off-Field Conditioning</span>
                    <p class="text-[8px] text-gray-500 print-text-black text-center leading-none mb-1.5 italic">Must be completed in your own time.</p>
                    <div class="flex flex-col gap-1.5 pl-2">
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Norwegian 4x4 (Row/Bike)
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> RSA Sprints (6x 35m)
                        </label>
                    </div>
                </div>
                
                <div class="w-56 border-[3px] border-black print-border-black rounded-lg flex flex-col bg-white p-2 shadow-sm">
                    <span class="text-[10px] font-black text-black uppercase tracking-widest border-b-2 border-gray-200 print-border-black mb-2 pb-1 text-center">Wellness Check (Tick One)</span>
                    <div class="flex flex-col gap-1.5 mt-0.5 pl-2">
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Feeling Good
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Okay, but sore
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Broken (See Coach)
                        </label>
                    </div>
                </div>
            </div>
        `;

        const renderApp = () => {
            const container = document.getElementById('root');
            
            const introHTML = `
                <div class="no-print bg-gray-900 text-white p-6 text-center mb-8 border-b-4 border-[#D00000]">
                    <h2 class="text-2xl font-brand uppercase tracking-widest mb-1">Newman Strong V2.2 Database</h2>
                    <p class="text-sm text-gray-400 mb-4">She-Wolf Protocol (3 Blocks: Jun/Jul, Aug, Sep/Oct) | Press CMD+P to print.</p>
                    <button onclick="window.print()" class="bg-[#D00000] hover:bg-red-700 text-white font-bold py-2 px-6 rounded transition tracking-widest uppercase text-sm">
                        Print Protocol Book
                    </button>
                </div>
            `;

            const pagesHTML = WOLFPACK_DATA.map(data => `
                <div class="print-container page-break relative w-full max-w-[1100px] mx-auto bg-white p-4 md:p-8 mb-8 shadow-xl print:shadow-none print:mb-0 border-t-[10px] border-black box-border flex flex-col justify-between" style="height: auto; min-height: 19cm">
                    <div>
                        ${getHeaderHTML()}
                        ${getTrackerHTML(data)}
                        ${getWarmupHTML()}
                        
                        <div class="flex items-center gap-3 mb-2 border-b-2 border-[#D00000] print-border-black pb-1 mt-4">
                            <h2 class="font-brand text-2xl text-black uppercase leading-none">${data.day} <span class="text-gray-300 print-text-black mx-1">|</span> <span class="text-[#D00000] print-text-black">${data.title}</span></h2>
                        </div>
                        <p class="text-gray-700 print-text-black font-bold text-[11px] mb-3 italic">${data.subtitle}</p>

                        ${getTableHTML(data.exercises)}
                    </div>
                    ${getFooterHTML()}
                </div>
            `).join('');

            container.innerHTML = `
                <div class="pb-10 bg-gray-100 print-bg-white">
                    ${introHTML}
                    ${pagesHTML}
                </div>
            `;
        };

        // Render the app when the page loads
        window.onload = renderApp;
    </script>
</body>
</html>
