<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She-Wolf Protocol | Printouts</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; 
        }
        .font-brand { font-family: 'Oswald', sans-serif; }
        
        /* Print Styles */
        @media print {
            @page { size: landscape; margin: 0.4cm; }
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .page-break { break-after: page; page-break-after: always; }
            .no-print { display: none !important; }
        }

        .print-box { 
            width: 14px; 
            height: 14px; 
            border: 2px solid black; 
            display: inline-block; 
            background: white; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // --- V2.2 ARMOR CIRCUIT DATA ---
        const ARMOR_CIRCUIT = [
            { name: "1. Tib Raises", reps: "20 reps", focus: "Ankle/Achilles armor against turf friction." },
            { name: "2. SL Calf Raises", reps: "15/leg", focus: "Lower leg resilience and ankle stiffness." },
            { name: "3. Cossack Squats", reps: "8/side", focus: "Unlocks adductors for multi-directional cutting." },
            { name: "4. Lu Raises", reps: "15 reps", focus: "Unlocks and protects against shoulder impingement." },
            { name: "5. Neck Isometrics", reps: "15s/way", focus: "Concussion armor & whiplash mitigation." },
            { name: "6. Bear Crawls", reps: "20m", focus: "Trunk stability & shoulder integration." },
            { name: "7. Spring Ankle Holds", reps: "10s Low / 10s High", focus: "Ankle stiffness & tendon prep. Drive big toe to floor." },
            { name: "8. Wrist Ext. Isos", reps: "2x 20s", focus: "Rubber band. Bulletproofs lateral elbows." }
        ];

        // --- THE SHE-WOLF PROTOCOL DATABASE ---
        const WOLFPACK_DATA = [
            // ==========================================
            // BLOCK 1: JUNE / JULY (INTRODUCTION)
            // ==========================================
            {
                months: ['JUN', 'JUL'],
                block: "PHASE 1: FOUNDATIONS", 
                intent: "Cementing the basics of extreme isometrics, deceleration, and 3x2 absolute force.",
                sessions: [
                    {
                        day: "FRIDAY: SESSION C", title: "PRE-MATCH PRIMER",
                        subtitle: "Getting fast, twitchy, and aligned 24-hours before kickoff.",
                        exercises: [
                            { name: "A. Barbell Drop Catches", sets: "3", reps: "6", rpe: "8", rest: "60s", notes: "Fire up the CNS and grip. Fast reactive catch. Builds forearm armor." },
                            { name: "B. Banded Broad Jumps", sets: "4", reps: "3", rpe: "MAX", rest: "60s", notes: "Fire the CNS. Pure horizontal acceleration. Drive big toe to floor." },
                            { name: "C. Drop-Catch RDL", sets: "2", reps: "5", rpe: "7", rest: "60s", notes: "Light weight. Fast snap. Wake up the hamstrings." },
                            { name: "D. Medball Rotations", sets: "2", reps: "5/side", rpe: "MAX", rest: "60s", notes: "Activate transverse plane for tackling. Root the back toe." }
                        ]
                    }
                ]
            }
        ];

        // --- RENDER LOGIC ---
        function getHeaderHTML() {
            return `
                <div class="border-b-[5px] border-black pb-2 mb-3 mt-1">
                    <div class="flex justify-between items-end">
                        <div>
                            <h1 class="font-brand text-4xl font-bold uppercase tracking-tighter text-black leading-none">Newman<span class="text-[#D00000]">Rugby</span></h1>
                            <h2 class="font-brand text-lg text-gray-600 tracking-widest uppercase mt-1">Academy Protocol V2.2 // Clinically Optimized</h2>
                        </div>
                        <div class="text-right">
                            <div class="bg-white text-black border-2 border-black px-3 py-1 text-xs font-bold tracking-widest uppercase inline-block mb-1">
                                The Four Pillars
                            </div>
                            <p class="text-[10px] font-bold text-black uppercase">1. Sleep // 2. Strength // 3. Nutrition // 4. Stress Mgt.</p>
                            <p class="text-[9px] text-gray-500 italic">"Without these, performance is irrelevant."</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function getTrackerHTML(data) {
            const monthsList = ['SEP', 'OCT', 'NOV', 'DEC', 'JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG'];
            const daysList = ['M', 'T', 'W', 'TH', 'F', 'S', 'SU'];

            const monthsHTML = monthsList.map(m => {
                const isCurrent = data.months.includes(m);
                return `
                    <label class="flex items-center gap-1 text-[8px] font-bold text-black">
                        <span class="w-3 h-3 border border-black inline-flex items-center justify-center font-bold text-[9px] ${isCurrent ? 'bg-gray-200' : 'bg-white'}">
                            ${isCurrent ? '&#10003;' : ''}
                        </span> ${m}
                    </label>
                `;
            }).join('');

            const daysHTML = daysList.map(d => `
                <label class="flex items-center gap-1 text-[10px] font-black text-black">
                    <span class="w-3 h-3 border border-gray-400 inline-block bg-white"></span> ${d}
                </label>
            `).join('');

            return `
            <div class="grid grid-cols-12 gap-3 mb-4">
                <div class="col-span-3 bg-white border-[3px] border-black p-3 rounded-lg shadow-sm relative overflow-hidden flex flex-col justify-center">
                    <div class="text-[11px] font-black text-black uppercase tracking-widest mb-2 border-b-2 border-black pb-1">01. Status (Tick)</div>
                    <div class="flex flex-col gap-2 mt-0.5">
                        <label class="flex items-center gap-2 text-[10px] font-black text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> GREEN (100% Load)
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-black text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> AMBER (Modified)
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-black text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> RED (Rehab Focus)
                        </label>
                    </div>
                </div>

                <div class="col-span-4 bg-gray-50 border-2 border-black p-2 rounded-lg flex flex-col justify-center">
                    <div class="text-[10px] font-bold text-black uppercase tracking-widest mb-1 border-b border-black pb-1">02. Macrocycle & Day</div>
                    <div class="flex flex-wrap gap-1 mt-1.5">
                        ${monthsHTML}
                    </div>
                    <div class="flex gap-4 mt-2 pt-1 border-t border-black">
                        ${daysHTML}
                    </div>
                </div>

                <div class="col-span-5 bg-white border-[3px] border-black p-3 rounded-lg text-black flex flex-col justify-center shadow-md">
                    <div class="text-[10px] font-bold text-black uppercase tracking-widest mb-1 border-b border-black pb-1">03. Phase & Intent</div>
                    <div class="mt-1">
                        <div class="text-[15px] font-black tracking-widest uppercase leading-none mb-1.5 text-[#D00000]">${data.block}</div>
                        <div class="text-[10px] font-medium leading-snug text-black">${data.intent}</div>
                    </div>
                </div>
            </div>
            `;
        }

        function getWarmupHTML() {
            const boxes = ARMOR_CIRCUIT.map(ex => `
                <div class="bg-white p-2 border-[0.5px] border-gray-400 flex flex-col justify-between h-full">
                    <div class="flex items-start justify-between gap-1 mb-1">
                        <span class="text-[11px] font-bold text-black leading-tight">${ex.name}</span>
                        <span class="w-3 h-3 border border-gray-400 flex-shrink-0 mt-0.5"></span>
                    </div>
                    <div>
                        <span class="text-[10px] font-black text-[#D00000] block mb-0.5 leading-none">${ex.reps}</span>
                        <span class="text-[8px] text-gray-800 leading-tight block">${ex.focus}</span>
                    </div>
                </div>
            `).join('');

            return `
            <div class="mb-4 border-2 border-black rounded-lg overflow-hidden">
                <div class="bg-white text-black border-b-2 border-black p-2 px-3 flex justify-between items-center">
                    <h3 class="font-brand text-sm font-bold tracking-widest uppercase">MANDATORY STANDARDIZED WARM-UP</h3>
                    <span class="text-xs font-bold text-black">7-MIN ARMOR CIRCUIT</span>
                </div>
                <div class="grid grid-cols-4 gap-0 bg-gray-200">
                    ${boxes}
                </div>
            </div>
            `;
        }

        function getTableHTML(exercises) {
            const rows = exercises.map((ex, idx) => `
                <tr class="${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'} border-b border-black">
                    <td class="p-2 border-r border-black align-top">
                        <div class="font-black text-black text-[12px] leading-tight">${ex.name}</div>
                        <div class="text-[10px] text-gray-700 font-bold leading-tight mt-1 pr-2">${ex.notes}</div>
                    </td>
                    <td class="p-2 text-center border-r border-black font-black text-black text-[12px] align-middle">
                        <span>${ex.sets} &times; ${ex.reps}</span>
                    </td>
                    <td class="p-2 text-center border-r border-black font-black text-black text-xs align-middle">${ex.rpe}</td>
                    <td class="p-2 text-center border-r border-black font-bold text-black text-[11px] align-middle">
                        ${ex.rest}
                    </td>
                    <td class="p-1 border-r border-black text-center align-middle"><div class="w-5 h-5 border-2 border-gray-400 mx-auto bg-white"></div></td>
                    <td class="p-1 border-r border-black text-center align-middle"><div class="w-5 h-5 border-2 border-gray-400 mx-auto bg-white"></div></td>
                    <td class="p-1 border-r border-black text-center align-middle"><div class="w-5 h-5 border-2 border-gray-400 mx-auto bg-white"></div></td>
                    <td class="p-1 border-r border-black text-center align-middle"><div class="w-5 h-5 border-2 border-gray-400 mx-auto bg-white"></div></td>
                    <td class="p-1.5 text-center align-middle">
                        <div class="h-6 border-b-2 border-gray-400 bg-transparent w-full"></div>
                    </td>
                </tr>
            `).join('');

            const emptyRowCount = Math.max(0, 5 - exercises.length);
            let emptyRows = '';
            for(let i=0; i<emptyRowCount; i++) {
                emptyRows += `
                    <tr class="bg-white border-b border-black h-10">
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2"></td>
                    </tr>
                `;
            }

            return `
            <div class="overflow-hidden rounded-lg border-[3px] border-black">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-black uppercase text-[10px] font-black tracking-widest border-b-[3px] border-black">
                            <th class="p-2 w-[32%] border-r border-black">Exercise (She-Wolf Protocol)</th>
                            <th class="p-2 text-center w-16 border-r border-black">Sets/Reps</th>
                            <th class="p-2 text-center w-12 border-r border-black">RPE</th>
                            <th class="p-2 text-center w-16 border-r border-black">Rest</th>
                            <th class="p-2 text-center w-10 border-r border-black">S1</th>
                            <th class="p-2 text-center w-10 border-r border-black">S2</th>
                            <th class="p-2 text-center w-10 border-r border-black">S3</th>
                            <th class="p-2 text-center w-10 border-r border-black">S4</th>
                            <th class="p-2 w-20 text-center">Load (KG)</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        ${rows}
                        ${emptyRows}
                    </tbody>
                </table>
            </div>
            `;
        }

        function getFooterHTML() {
            return `
            <div class="mt-4 flex gap-4 h-24 shrink-0">
                <div class="flex-1 border-2 border-black rounded-lg bg-gray-50 p-2 relative shadow-sm">
                    <span class="text-[10px] font-black text-black uppercase tracking-widest">Coaching Notes & Adjustments</span>
                    <div class="h-full flex items-end pb-1">
                        <span class="text-[9px] text-gray-500 italic w-full text-center">(Record loads, box heights, completion times, or modifications here)</span>
                    </div>
                </div>

                <div class="w-56 border-[3px] border-black rounded-lg flex flex-col bg-white p-2 shadow-sm">
                    <span class="text-[10px] font-black text-black uppercase tracking-widest border-b-2 border-gray-200 mb-1.5 pb-1 text-center">Off-Field Conditioning</span>
                    <p class="text-[8px] text-gray-600 text-center leading-none mb-1.5 italic">Must be completed in your own time.</p>
                    <div class="flex flex-col gap-1.5 pl-2">
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Norwegian 4x4 (Row/Bike)
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> RSA Sprints (6x 35m)
                        </label>
                    </div>
                </div>
                
                <div class="w-56 border-[3px] border-black rounded-lg flex flex-col bg-white p-2 shadow-sm">
                    <span class="text-[10px] font-black text-black uppercase tracking-widest border-b-2 border-gray-200 mb-2 pb-1 text-center">Wellness Check (Tick One)</span>
                    <div class="flex flex-col gap-1.5 mt-0.5 pl-2">
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Feeling Good
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Okay, but sore
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Broken (See Coach)
                        </label>
                    </div>
                </div>
            </div>
            `;
        }

        // --- RENDER APPLICATION ---
        function renderPrintouts() {
            const container = document.getElementById('root');
            
            const introHTML = `
                <div class="no-print bg-gray-900 text-white p-6 text-center mb-8 border-b-4 border-[#D00000]">
                    <h2 class="text-2xl font-brand uppercase tracking-widest mb-1">Newman Strong V2.2 Database</h2>
                    <p class="text-sm text-gray-400 mb-4">She-Wolf Protocol Printouts (3 Blocks: Jun/Jul, Aug, Sep/Oct) | Press CMD+P to print.</p>
                    <button onclick="window.print()" class="bg-[#D00000] hover:bg-red-700 text-white font-bold py-2 px-6 rounded transition tracking-widest uppercase text-sm">
                        Print Protocol Book
                    </button>
                </div>
            `;

            const pagesHTML = WOLFPACK_DATA.map(block => {
                return block.sessions.map(session => `
                    <div class="print-container page-break relative w-full max-w-[1100px] mx-auto bg-white p-4 md:p-8 mb-8 shadow-xl border-t-[10px] border-black box-border flex flex-col justify-between" style="height: auto; min-height: 19cm">
                        <div>
                            ${getHeaderHTML()}
                            ${getTrackerHTML(block)}
                            ${getWarmupHTML()}
                            
                            <div class="flex items-center gap-3 mb-2 border-b-2 border-[#D00000] pb-1 mt-4">
                                <h2 class="font-brand text-2xl text-black uppercase leading-none">${session.day} <span class="text-gray-300 mx-1">|</span> <span class="text-[#D00000]">${session.title}</span></h2>
                            </div>
                            <p class="text-gray-700 font-bold text-[11px] mb-3 italic">${session.subtitle}</p>

                            ${getTableHTML(session.exercises)}
                        </div>
                        ${getFooterHTML()}
                    </div>
                `).join('');
            }).join('');

            container.innerHTML = `
                <div class="pb-10 bg-gray-100">
                    ${introHTML}
                    ${pagesHTML}
                </div>
            `;
        }

        window.onload = renderPrintouts;
    </script>
</body>
</html>
